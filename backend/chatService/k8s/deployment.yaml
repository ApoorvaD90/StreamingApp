apiVersion: apps/v1
kind: Deployment

metadata:
  name: chatservice
  labels:
    app: chatservice

spec:
  replicas: 2

  selector:
    matchLabels:
      app: chatservice

  template:
    metadata:
      labels:
        app: chatservice

    spec:
      containers:
      - name: chatservice

        image: 975630231376.dkr.ecr.ap-southeast-2.amazonaws.com/streamingapp-chat:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 3004

        env:
        - name: PORT
          value: "3004"

        - name: MONGO_URI
          value: "mongodb://mongodb:27017/streamingapp"

        - name: JWT_SECRET
          value: "streaming-secret"
