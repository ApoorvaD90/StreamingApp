apiVersion: apps/v1
kind: Deployment
metadata:
name: chat-service
namespace: streamingapp
labels:
app: chat-service
spec:
replicas: 2
selector:
matchLabels:
app: chat-service
template:
metadata:
labels:
app: chat-service
spec:
containers:
- name: chat-service
image: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/streamingapp/chat-service:latest
imagePullPolicy: Always
ports:
- containerPort: 3004
envFrom:
- secretRef:
name: streamingapp-secrets
env:
- name: PORT
value: "3004"
resources:
requests:
cpu: 100m
memory: 128Mi
limits:
cpu: 300m
memory: 256Mi
livenessProbe:
tcpSocket:
port: 3004
initialDelaySeconds: 20
periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
name: chat-service
namespace: streamingapp
spec:
selector:
app: chat-service
ports:
- port: 3004
targetPort: 3004
type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
name: chat-service-hpa
namespace: streamingapp
spec:
scaleTargetRef:
apiVersion: apps/v1
kind: Deployment
name: chat-service
minReplicas: 2
maxReplicas: 6
metrics:
- type: Resource
resource:
name: cpu
target:
type: Utilization
averageUtilization: 70